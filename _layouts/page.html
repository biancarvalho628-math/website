---
layout: default
---
<article class="post">

  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  <div class="post-content">
    {%- if page.banner -%}
    <div class="banner">
      <img src="{{ page.banner.src }}" alt="{{ page.banner.alt }}">
    </div>
    {%- endif -%}
    {{ content }}
  </div>

</article>
